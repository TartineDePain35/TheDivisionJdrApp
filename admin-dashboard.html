<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau de bord Admin - Division JDR</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
    }

    .admin-dashboard-container {
      width: min(100%, 560px);
      max-width: 560px;
      margin: 0 auto;
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top, 18px) + 14px) 16px 28px;
      position: relative;
    }

    .admin-header-dashboard {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .admin-header-dashboard h1 {
      color: var(--accent);
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
    }

    .admin-dashboard {
      background: var(--panel);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
    }

    .admin-dashboard h2 {
      color: var(--accent);
      margin: 0 0 14px;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .agents-table {
      width: 100%;
      border-collapse: collapse;
    }

    .agents-table th {
      text-align: left;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .agents-table td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 0.92rem;
    }

    .agents-table tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .agents-table a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .agents-table a:hover {
      text-decoration: underline;
    }

    .empty-state {
      color: var(--text-muted);
      text-align: center;
      padding: 32px 16px;
      font-style: italic;
    }

    .admin-actions {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }

    .admin-actions .btn {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="admin-dashboard-container">
    <div class="admin-header-dashboard">
      <h1>Tableau de bord Admin</h1>
      <a href="/" class="btn btn-tertiary">Retour</a>
    </div>

    <div class="admin-dashboard">
      <div class="admin-actions">
        <a href="/admin/adventures" class="btn btn-primary">Gérer les Aventures</a>
      </div>
      <h2>Agents Actifs</h2>
    <div id="agentsList">
      <table class="agents-table">
        <thead>
          <tr>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="agentsTableBody">
          <tr>
            <td colspan="3" class="empty-state">Chargement en cours...</td>
          </tr>
        </tbody>
      </table>
    </div>
    </div><!-- End admin-dashboard -->
  </div><!-- End admin-dashboard-container -->

  <script>
    async function loadAgents() {
      try {
        const response = await fetch('/api/agents');
        const data = await response.json();
        
        if (data.success && data.agents && data.agents.length > 0) {
          const tbody = document.getElementById('agentsTableBody');
          tbody.innerHTML = '';
          
          data.agents.forEach(agent => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td><a href="/admin/agent/${agent.id}">${agent.name || 'N/A'}</a></td>
              <td><a href="/admin/agent/${agent.id}">${agent.firstName || 'N/A'}</a></td>
              <td><a href="/admin/agent/${agent.id}" class="btn btn-sm">Voir</a></td>
            `;
            tbody.appendChild(row);
          });
        } else {
          document.getElementById('agentsTableBody').innerHTML = 
            '<tr><td colspan="3" class="empty-state">Aucun agent trouvé</td></tr>';
        }
      } catch (error) {
        document.getElementById('agentsTableBody').innerHTML = 
          '<tr><td colspan="3" class="empty-state">Erreur de chargement</td></tr>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadAgents);
  </script>
</body>
</html>
