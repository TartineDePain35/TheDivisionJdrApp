<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Division JDR - Créer une Aventure</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-container {
      width: min(100%, 560px);
      max-width: 560px;
      margin: 0 auto;
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top, 18px) + 14px) 16px 28px;
      position: relative;
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    
    .admin-header h1 {
      margin: 0;
      color: var(--accent);
      font-size: 1.4rem;
      letter-spacing: 0.08em;
    }
    
    .admin-nav {
      display: flex;
      gap: 10px;
    }
    
    .create-form {
      max-width: 100%;
      margin: 0 auto;
      background: var(--panel);
      padding: 20px;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    
    .create-form h2 {
      color: var(--accent);
      margin: 0 0 12px;
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
    }
    
    .create-form > p {
      color: var(--text-muted);
      text-align: center;
      margin: 0 0 20px;
      line-height: 1.6;
    }
    
    .create-form label {
      display: block;
      margin-top: 18px;
      color: var(--text-muted);
      font-size: 0.92rem;
    }
    
    .create-form input,
    .create-form textarea {
      width: 100%;
      padding: 16px 14px;
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-family: inherit;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }
    
    .create-form textarea {
      min-height: 150px;
      resize: vertical;
    }
    
    .create-form input:focus,
    .create-form textarea:focus {
      outline: none;
      border-color: rgba(255,143,31,0.65);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 4px rgba(255,143,31,0.1);
      transform: translateY(-1px);
    }
    
    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    
    .form-actions .btn {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <header class="admin-header">
      <h1>Créer une Aventure</h1>
      <nav class="admin-nav">
        <a href="/admin/adventures" class="btn btn-tertiary">Retour aux aventures</a>
      </nav>
    </header>

    <main>
      <div class="create-form">
        <h2>Nouvelle Aventure</h2>
        <p style="color: #888; text-align: center;">Remplissez les informations pour créer une nouvelle aventure.</p>
        
        <form id="adventureForm">
          <label for="adventureName">Nom de l'aventure *</label>
          <input id="adventureName" name="name" type="text" placeholder="Ex: Mission à Washington" required />
          
          <label for="adventureDescription">Description</label>
          <textarea id="adventureDescription" name="description" placeholder="Décrivez le scénario, les objectifs et le contexte de cette aventure..." style="min-height: 200px;"></textarea>
          
          <div class="form-actions">
            <button type="button" onclick="window.location.href='/admin/adventures'" class="btn btn-tertiary">Annuler</button>
            <button type="submit" class="btn btn-primary">Créer l'Aventure</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script>
    document.getElementById('adventureForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('adventureName').value.trim();
      const description = document.getElementById('adventureDescription').value.trim();
      
      if (!name) {
        alert('Le nom de l\'aventure est requis.');
        return;
      }
      
      try {
        const response = await fetch('/api/admin/adventures', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, description })
        });
        
        const data = await response.json();
        
        if (data.success) {
          alert('Aventure créée avec succès !');
          window.location.href = `/admin/adventures/${data.adventureId}/edit`;
        } else {
          alert('Erreur: ' + (data.message || 'Inconnu'));
        }
      } catch (error) {
        console.error('Erreur lors de la création:', error);
        alert('Erreur réseau. Veuillez réessayer.');
      }
    });
  </script>
</body>
</html>
