<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Espace Admin - Division JDR</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .admin-login-card {
      background: var(--panel);
      border-radius: 18px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
    }

    .admin-login-card h2 {
      color: var(--accent);
      text-align: center;
      margin: 0 0 24px;
      font-size: 1.3rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .admin-login-card .form-group {
      margin-bottom: 14px;
    }

    .admin-login-card label {
      display: block;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-size: 0.92rem;
    }

    .admin-login-card input {
      width: 100%;
      padding: 16px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 0.92rem;
      box-sizing: border-box;
    }

    .admin-login-card input:focus {
      outline: none;
      border-color: rgba(255,143,31,0.65);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 4px rgba(255,143,31,0.1);
    }

    .admin-login-card .btn {
      width: 100%;
      margin-top: 8px;
    }

    .admin-login-card a.btn {
      margin-top: 8px;
      text-align: center;
      text-decoration: none;
      display: block;
    }

    .error-message {
      color: #dc3545;
      text-align: center;
      margin-top: 14px;
      font-size: 0.92rem;
      display: none;
      background: rgba(220, 53, 69, 0.12);
      border: 1px solid rgba(220, 53, 69, 0.32);
      padding: 12px;
      border-radius: 14px;
    }
  </style>
</head>
<body>
  <div class="admin-login-card">
    <h2>Admin</h2>
    <form id="adminLoginForm">
      <div class="form-group">
        <label for="adminUsername">Utilisateur</label>
        <input id="adminUsername" name="username" type="text" placeholder="Identifiant" required />
      </div>
      <div class="form-group">
        <label for="adminPassword">Mot de passe</label>
        <input id="adminPassword" name="password" type="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary">Se connecter</button>
      <a href="/" class="btn btn-tertiary">Retour</a>
    </form>
    <div id="adminError" class="error-message">Accès refusé</div>
  </div>

  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('adminUsername').value;
      const password = document.getElementById('adminPassword').value;
      
      const response = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      
      const data = await response.json();
      if (data.success) {
        window.location.href = '/admin/dashboard';
      } else {
        document.getElementById('adminError').style.display = 'block';
      }
    });
  </script>
</body>
</html>
