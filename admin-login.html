<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Espace Admin - Division JDR</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .admin-login-card {
      background: #16213e;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .admin-login-card h2 {
      color: #e94560;
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }
    .admin-login-card .form-group {
      margin-bottom: 1rem;
    }
    .admin-login-card label {
      display: block;
      color: #a0a0a0;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
    .admin-login-card input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      background: #0f3460;
      color: #fff;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .admin-login-card input:focus {
      outline: none;
      border-color: #e94560;
    }
    .admin-login-card .btn {
      width: 100%;
      padding: 0.75rem;
      margin-top: 1rem;
      font-size: 1rem;
    }
    .error-message {
      color: #e94560;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="admin-login-card">
    <h2>Connexion Admin</h2>
    <form id="adminLoginForm">
      <div class="form-group">
        <label for="adminUsername">Utilisateur</label>
        <input id="adminUsername" name="username" type="text" placeholder="AdminAgent" required />
      </div>
      <div class="form-group">
        <label for="adminPassword">Mot de passe</label>
        <input id="adminPassword" name="password" type="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary">Se connecter</button>
      <a href="/" class="btn btn-tertiary" style="margin-top: 0.5rem;">Retour</a>
    </form>
    <div id="adminError" class="error-message">Accès refusé</div>
  </div>

  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('adminUsername').value;
      const password = document.getElementById('adminPassword').value;
      
      const response = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      
      const data = await response.json();
      if (data.success) {
        window.location.href = '/admin/dashboard';
      } else {
        document.getElementById('adminError').style.display = 'block';
      }
    });
  </script>
</body>
</html>
