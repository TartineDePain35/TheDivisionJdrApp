<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Édition Agent - Division JDR</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .admin-agent-container {
      width: min(100%, 560px);
      max-width: 560px;
      margin: 0 auto;
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top, 18px) + 14px) 16px 28px;
      position: relative;
    }

    .agent-info-header {
      background: var(--panel);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
    }

    .agent-info-header h2 {
      color: var(--accent);
      margin: 0 0 10px;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
    }

    .agent-meta {
      color: var(--text-muted);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .edit-form {
      background: var(--panel);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
    }

    .form-section {
      margin-bottom: 24px;
    }

    .form-section h3 {
      color: var(--accent);
      margin: 0 0 14px;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 16px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 0.92rem;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: rgba(255,143,31,0.65);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 4px rgba(255,143,31,0.1);
      transform: translateY(-1px);
    }

    .form-group textarea {
      min-height: 110px;
      resize: vertical;
    }

    .effects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    .effect-item {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .effect-item:hover {
      border-color: rgba(255, 143, 31, 0.5);
      background: rgba(255, 255, 255, 0.08);
    }

    .effect-item.selected {
      border-color: rgba(255, 143, 31, 0.8);
      background: rgba(255, 143, 31, 0.15);
    }

    .effect-item .effect-name {
      color: var(--text);
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .effect-item .effect-description {
      color: var(--text-muted);
      font-size: 0.75rem;
      line-height: 1.4;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-card {
      background: var(--panel);
      border-radius: 18px;
      padding: 24px;
      max-width: 90vw;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
    }

    .modal-card h2 {
      color: var(--accent);
      margin: 0 0 14px;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .message-item {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 12px 14px;
      position: relative;
      margin-bottom: 10px;
    }

    .message-item .message-value {
      color: var(--text);
      font-size: 0.92rem;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .message-item .message-date {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .message-item .delete-message-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(220, 53, 69, 0.18);
      color: #dc3545;
      border: 1px solid rgba(220, 53, 69, 0.32);
      border-radius: 8px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .message-item .delete-message-btn:hover {
      background: rgba(220, 53, 69, 0.28);
      border-color: rgba(220, 53, 69, 0.5);
    }

    .admin-header-alt {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 10px;
    }

    .admin-header-alt h1 {
      margin: 0;
      color: var(--accent);
      font-size: 1.4rem;
      letter-spacing: 0.08em;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 20px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .form-actions .btn {
      flex: 0 1 auto;
    }
  </style>
</head>
<body>
  <div class="admin-agent-container">
    <div class="admin-header-alt">
      <h1>Édition Agent</h1>
      <div style="display: flex; gap: 10px; align-items: center;">
        <a href="/admin/dashboard" class="btn btn-tertiary">Retour</a>
        <button id="sendMessageBtn" class="btn btn-primary">Envoyer Message</button>
      </div>
    </div>

  <div id="agentInfo" class="agent-info-header" style="display: none;">
    <h2 id="agentFullName">Chargement...</h2>
    <div id="agentMeta" class="agent-meta"></div>
  </div>

  <div id="editFormContainer" style="display: none;">
    <form id="editAgentForm" class="edit-form">
      <div class="form-section">
        <h3>Stats et Santé</h3>
        <div class="form-row">
          <div class="form-group">
            <label for="lifePercent">Santé (%)</label>
            <input type="number" id="lifePercent" name="lifePercent" min="0" max="100" />
          </div>
          <div class="form-group">
            <label for="inventoryCapacity">Capacité Inventaire</label>
            <input type="number" id="inventoryCapacity" name="inventoryCapacity" min="0" />
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3>Points Disponibles</h3>
        <div class="form-row">
          <div class="form-group">
            <label for="availableStatsPoints">Points Stats</label>
            <input type="number" id="availableStatsPoints" name="availableStatsPoints" min="0" />
          </div>
          <div class="form-group">
            <label for="availableAttributesPoints">Points Attributs</label>
            <input type="number" id="availableAttributesPoints" name="availableAttributesPoints" min="0" />
          </div>
          <div class="form-group">
            <label for="availableTalentPoints">Points Talents</label>
            <input type="number" id="availableTalentPoints" name="availableTalentPoints" min="0" />
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3>Mission Active</h3>
        <div class="form-group">
          <label for="activeMission">Mission</label>
          <input type="text" id="activeMission" name="activeMission" />
        </div>
      </div>

      <div class="form-section">
        <h3>Effets</h3>
        <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 12px;">
          Cliquez sur un effet pour l'ajouter/supprimer
        </p>
        <div id="effectsContainer" class="effects-grid">
          <div class="loading">Chargement des effets...</div>
        </div>
        <input type="hidden" id="selectedEffects" name="selectedEffects" />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Valider</button>
      </div>
    </form>
  </div>

  <div id="loading" class="loading">Chargement de l'agent...</div>

  <!-- Modal pour envoyer un message -->
  <div id="messageModal" class="modal-overlay" style="display: none;">
    <div class="modal-card" style="max-width: 500px;">
      <h2>Envoyer un message</h2>
      <form id="messageForm">
        <div class="form-group">
          <label for="messageValue">Message</label>
          <textarea id="messageValue" name="messageValue" rows="4" placeholder="Saisissez votre message..." style="min-height: 100px;"></textarea>
        </div>
        <div class="form-actions" style="justify-content: flex-end; margin-top: 14px;">
          <button type="button" id="cancelMessageBtn" class="btn btn-tertiary">Annuler</button>
          <button type="submit" id="sendMessageSubmitBtn" class="btn btn-primary" disabled>Envoyer</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Section pour afficher les messages -->
  <div id="messagesSection" class="form-section" style="display: none;">
    <h3>Messages envoyés à cet agent</h3>
    <div id="messagesList" class="effects-grid"></div>
  </div>
  </div><!-- End admin-agent-container -->

  <script>
    const agentId = window.location.pathname.split('/').pop();
    let allEffects = [];
    let agentEffects = new Set();

    async function loadAgent() {
      try {
        const [agentRes, effectsRes] = await Promise.all([
          fetch(`/api/agents/${agentId}`),
          fetch('/api/effects')
        ]);

        const agentData = await agentRes.json();
        const effectsData = await effectsRes.json();

        if (!agentData.success || !agentData.agent) {
          document.getElementById('loading').textContent = 'Agent non trouvé';
          return;
        }

        const agent = agentData.agent;
        allEffects = effectsData.success ? effectsData.effects : [];
        agentEffects = new Set((agent.assignedEffects || []).map(e => e.id));

        // Store full agent data for submission
        window.currentAgent = agent;

        // Display agent info
        document.getElementById('agentFullName').textContent = 
          `${agent.name || 'N/A'} ${agent.firstName || ''}`.trim();
        document.getElementById('agentMeta').textContent = 
          `ID: ${agent.id} | Âge: ${agent.age || 'N/A'} | ${agent.profession || 'N/A'}`;

        // Fill form
        document.getElementById('lifePercent').value = agent.lifePercent ?? 100;
        document.getElementById('availableStatsPoints').value = agent.availableStatsPoints ?? 0;
        document.getElementById('availableAttributesPoints').value = agent.availableAttributesPoints ?? 0;
        document.getElementById('availableTalentPoints').value = agent.availableTalentPoints ?? 0;
        document.getElementById('activeMission').value = agent.activeMission || '';
        document.getElementById('inventoryCapacity').value = agent.inventoryCapacity ?? 30;

        // Show forms
        document.getElementById('agentInfo').style.display = 'block';
        document.getElementById('editFormContainer').style.display = 'block';
        document.getElementById('loading').style.display = 'none';

        renderEffects();
      } catch (error) {
        document.getElementById('loading').textContent = 'Erreur de chargement';
      }
    }

    function renderEffects() {
      const container = document.getElementById('effectsContainer');
      container.innerHTML = '';

      allEffects.forEach(effect => {
        const item = document.createElement('div');
        item.className = `effect-item ${agentEffects.has(effect.id) ? 'selected' : ''}`;
        item.innerHTML = `
          <div class="effect-name">${effect.name}</div>
          <div class="effect-description">${effect.description || ''}</div>
        `;
        item.addEventListener('click', () => toggleEffect(effect.id));
        container.appendChild(item);
      });
    }

    function toggleEffect(effectId) {
      if (agentEffects.has(effectId)) {
        agentEffects.delete(effectId);
      } else {
        agentEffects.add(effectId);
      }
      document.getElementById('selectedEffects').value = Array.from(agentEffects).join(',');
      renderEffects();
    }

    document.getElementById('editAgentForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      // Start with full agent data and apply modifications
      const updatedAgent = { ...window.currentAgent };
      updatedAgent.id = parseInt(agentId);
      updatedAgent.lifePercent = parseInt(document.getElementById('lifePercent').value) || 100;
      updatedAgent.availableStatsPoints = parseInt(document.getElementById('availableStatsPoints').value) || 0;
      updatedAgent.availableAttributesPoints = parseInt(document.getElementById('availableAttributesPoints').value) || 0;
      updatedAgent.availableTalentPoints = parseInt(document.getElementById('availableTalentPoints').value) || 0;
      updatedAgent.activeMission = document.getElementById('activeMission').value || '';
      updatedAgent.inventoryCapacity = parseInt(document.getElementById('inventoryCapacity').value) || 30;
      updatedAgent.assignedEffects = Array.from(agentEffects);

      try {
        const response = await fetch(`/api/agents/${agentId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updatedAgent)
        });

        const data = await response.json();
        if (data.success) {
          showToast('Agent mis à jour avec succès !');
        } else {
          showToast('Erreur lors de la mise à jour : ' + (data.message || 'Inconnu'));
        }
      } catch (error) {
        showToast('Erreur réseau : ' + error.message);
      }
    });

    function showToast(message) {
      const toastEl = document.getElementById('toast');
      if (toastEl) {
        toastEl.textContent = message;
        toastEl.classList.add('show');
        window.clearTimeout(showToast.timeout);
        showToast.timeout = window.setTimeout(() => toastEl.classList.remove('show'), 2400);
      }
    }

    let isSubmittingMessage = false;

    function openMessageModal() {
      if (!messageModal) return;
      messageModal.style.display = 'flex';
      requestAnimationFrame(() => messageModal.classList.add('active'));
      if (messageValueInput) {
        messageValueInput.value = '';
        messageValueInput.focus();
      }
      if (sendMessageSubmitBtn) {
        sendMessageSubmitBtn.disabled = true;
      }
    }

    function closeMessageModal() {
      if (!messageModal) return;
      messageModal.classList.remove('active');
      messageModal.style.display = 'none';
    }

    // Gestion des messages
    const messageModal = document.getElementById('messageModal');
    const messageForm = document.getElementById('messageForm');
    const messageValueInput = document.getElementById('messageValue');
    const sendMessageBtn = document.getElementById('sendMessageBtn');
    const sendMessageSubmitBtn = document.getElementById('sendMessageSubmitBtn');
    const cancelMessageBtn = document.getElementById('cancelMessageBtn');
    const messagesSection = document.getElementById('messagesSection');
    const messagesList = document.getElementById('messagesList');

    // Charger les messages de l'agent
    async function loadMessages() {
      if (!messagesSection || !messagesList) return;

      try {
        const response = await fetch(`/api/messages/${agentId}`);
        const data = await response.json();

        if (data.success && data.messages) {
          renderMessages(data.messages);
          messagesSection.style.display = 'block';
        } else {
          messagesList.innerHTML = '<div class="loading">Aucun message envoyé.</div>';
          messagesSection.style.display = 'block';
        }
      } catch (error) {
        console.error('Erreur de chargement des messages:', error);
      }
    }

    // Afficher les messages
    function renderMessages(messages) {
      if (!messagesList) return;
      
      messagesList.innerHTML = '';
      
      if (messages.length === 0) {
        messagesList.innerHTML = '<div class="loading">Aucun message envoyé.</div>';
        return;
      }

      messages.forEach(message => {
        const messageEl = document.createElement('div');
        messageEl.className = 'message-item';
        messageEl.innerHTML = `
          <button class="delete-message-btn" data-message-id="${message.id}" title="Supprimer">×</button>
          <div class="message-value">${escapeHtml(message.value)}</div>
          <div class="message-date">ID: ${message.id}</div>
        `;
        
        // Ajouter l'écouteur pour la suppression
        const deleteBtn = messageEl.querySelector('.delete-message-btn');
        if (deleteBtn) {
          deleteBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            await deleteMessage(message.id);
          });
        }
        
        messagesList.appendChild(messageEl);
      });
    }

    // Supprimer un message
    async function deleteMessage(messageId) {
      if (!confirm('Voulez-vous vraiment supprimer ce message ?')) return;

      try {
        const response = await fetch(`/api/messages/${messageId}`, {
          method: 'DELETE'
        });

        const data = await response.json();
        if (data.success) {
          showToast('Message supprimé avec succès !');
          loadMessages();
        } else {
          showToast('Erreur: ' + (data.message || 'Inconnu'));
        }
      } catch (error) {
        showToast('Erreur réseau: ' + error.message);
      }
    }

    // Échapper le HTML pour éviter les XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Attacher les écouteurs des messages dans DOMContentLoaded pour s'assurer que le DOM est prêt
    document.addEventListener('DOMContentLoaded', () => {
      // Gestion des messages - Attacher les écouteurs
      const messageModal = document.getElementById('messageModal');
      const messageForm = document.getElementById('messageForm');
      const messageValueInput = document.getElementById('messageValue');
      const sendMessageBtn = document.getElementById('sendMessageBtn');
      const sendMessageSubmitBtn = document.getElementById('sendMessageSubmitBtn');
      const cancelMessageBtn = document.getElementById('cancelMessageBtn');
      const messagesSection = document.getElementById('messagesSection');
      const messagesList = document.getElementById('messagesList');

      // Ouvrir la modal de message
      if (sendMessageBtn) {
        sendMessageBtn.addEventListener('click', () => {
          if (messageModal) {
            openMessageModal();
          }
        });
      }

      // Fermer la modal de message
      if (cancelMessageBtn) {
        cancelMessageBtn.addEventListener('click', () => {
          if (messageModal) closeMessageModal();
        });
      }

      // Fermer la modal en cliquant en dehors
      if (messageModal) {
        messageModal.addEventListener('click', (e) => {
          if (e.target === messageModal) {
            closeMessageModal();
          }
        });
      }

      // Activer/désactiver le bouton Envoyer selon le contenu du message
      if (messageValueInput) {
        messageValueInput.addEventListener('input', () => {
          if (sendMessageSubmitBtn) {
            sendMessageSubmitBtn.disabled = !messageValueInput.value.trim();
          }
        });
      }

      // Envoyer le message
      if (messageForm) {
        messageForm.addEventListener('submit', async (e) => {
          e.preventDefault();

          const messageValue = messageValueInput?.value.trim();
          if (!messageValue || isSubmittingMessage) return;

          isSubmittingMessage = true;
          if (sendMessageSubmitBtn) {
            sendMessageSubmitBtn.disabled = true;
          }

          try {
            const response = await fetch('/api/messages', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                agent_id: parseInt(agentId),
                value: messageValue
              })
            });

            const data = await response.json();
            if (data.success) {
              showToast('Message envoyé avec succès !');
              if (messageModal) closeMessageModal();
              if (messageValueInput) messageValueInput.value = '';
              if (sendMessageSubmitBtn) sendMessageSubmitBtn.disabled = true;
              loadMessages();
            } else {
              showToast('Erreur: ' + (data.message || 'Inconnu'));
            }
          } catch (error) {
            showToast('Erreur réseau: ' + error.message);
          } finally {
            isSubmittingMessage = false;
            if (sendMessageSubmitBtn && messageValueInput) {
              sendMessageSubmitBtn.disabled = !messageValueInput.value.trim();
            }
          }
        });
      }

      // Charger les messages de l'agent
      async function loadMessages() {
        if (!messagesSection || !messagesList) return;

        try {
          const response = await fetch(`/api/messages/${agentId}`);
          const data = await response.json();

          if (data.success && data.messages) {
            renderMessages(data.messages);
            messagesSection.style.display = 'block';
          } else {
            messagesList.innerHTML = '<div class="loading">Aucun message envoyé.</div>';
            messagesSection.style.display = 'block';
          }
        } catch (error) {
          console.error('Erreur de chargement des messages:', error);
        }
      }

      // Afficher les messages
      function renderMessages(messages) {
        if (!messagesList) return;
        
        messagesList.innerHTML = '';
        
        if (messages.length === 0) {
          messagesList.innerHTML = '<div class="loading">Aucun message envoyé.</div>';
          return;
        }

        messages.forEach(message => {
          const messageEl = document.createElement('div');
          messageEl.className = 'message-item';
          messageEl.innerHTML = `
            <button class="delete-message-btn" data-message-id="${message.id}" title="Supprimer">×</button>
            <div class="message-value">${escapeHtml(message.value)}</div>
            <div class="message-date">ID: ${message.id}</div>
          `;
          
          // Ajouter l'écouteur pour la suppression
          const deleteBtn = messageEl.querySelector('.delete-message-btn');
          if (deleteBtn) {
            deleteBtn.addEventListener('click', async (e) => {
              e.stopPropagation();
              await deleteMessage(message.id);
            });
          }
          
          messagesList.appendChild(messageEl);
        });
      }

      // Supprimer un message
      async function deleteMessage(messageId) {
        if (!confirm('Voulez-vous vraiment supprimer ce message ?')) return;

        try {
          const response = await fetch(`/api/messages/${messageId}`, {
            method: 'DELETE'
          });

          const data = await response.json();
          if (data.success) {
            showToast('Message supprimé avec succès !');
            loadMessages();
          } else {
            showToast('Erreur: ' + (data.message || 'Inconnu'));
          }
        } catch (error) {
          showToast('Erreur réseau: ' + error.message);
        }
      }

      // Charger l'agent et les messages
      loadAgent();
      loadMessages();
    });
  </script>
  <div id="toast" class="toast"></div>
</body>
</html>
